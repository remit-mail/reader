# Publish pipeline: one registry-gated mechanism publishes every open-core
# `@remit/*` package — the workspace services under packages/ and the
# TypeSpec-generated packages under build/. The public registry is the source of
# truth for versions: each package publishes only when its freshly built content
# differs from the version on npm, patch-bumping from the registry version (or
# seeding 0.0.1). No changesets, no committed version bumps.
#
# Pushes to main publish for real, gated behind the `NPM_PUBLISH_ENABLED`
# repository variable so publishing is armed deliberately. Set the variable to
# `true` to go live.
#
# The pull request half — the dry run that packs every package and checks the
# publish surface without writing to the registry — lives in ci.yml as
# `publish-dry-run`, because only a job in that workflow can be a dependency of
# the `gate` job branch protection requires.
#
# Auth is the granular access token in the `NPM_TOKEN` secret.
name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'push' && vars.NPM_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci --no-audit --no-fund --loglevel=error
      - run: make
      # Content-hash-gated: publishes only packages whose content changed,
      # generated (build/) before the workspace set that depends on them. Safe on
      # every run.
      - run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
