# Publish pipeline: changesets drives versioning and publishing of the open-core
# `@remit/*` packages to the public npm org.
#
# Pull requests run a dry run — version + pack the intended package set, no
# registry access. Pushes to main publish for real, gated behind the
# `NPM_PUBLISH_ENABLED` repository variable so publishing is armed deliberately.
# Set the variable to `true` to go live.
#
# Auth is the granular access token in the `NPM_TOKEN` secret.
name: Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dry-run:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund --loglevel=error
      - run: make
      - run: npm run release:dry-run

  publish:
    if: github.event_name == 'push' && vars.NPM_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci --no-audit --no-fund --loglevel=error
      - run: make
      # On merge with pending changesets: opens/updates a "Version Packages" PR.
      # On merge with none pending (that PR merged): publishes the bumped set.
      - uses: changesets/action@v1
        with:
          version: npm run release:version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
