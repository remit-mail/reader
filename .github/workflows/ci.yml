name: CI

on:
  push:
    branches: [main]
  pull_request:

# Superseded pull request pushes are cancelled; runs on main are not, so every
# commit that lands keeps a completed result.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Static validation that needs no workspace install: the installer script, the
  # deploy compose stacks, and the manifest syntax.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The coverage guard is plain stdlib Node and needs no workspace install,
      # only a pinned interpreter.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer — shell syntax
        run: bash -n install.sh

      - name: Installer — shellcheck
        run: shellcheck install.sh

      - name: Release scripts — shellcheck
        run: |
          shellcheck -x npm-scripts/release-tag.sh npm-scripts/release-check-tag.sh \
            npm-scripts/release-check-annotation.sh \
            npm-scripts/lib/image-roster.sh npm-scripts/lib/manifest-check.sh \
            npm-scripts/lib/summary-check.sh npm-scripts/lib/tag-object-check.sh

      # Every npm-scripts/**/*.test.mjs suite, discovered rather than listed, so
      # adding one runs it on the commit that adds it. No workspace install
      # needed: these test only the pure decision functions in npm-scripts/lib
      # (node:child_process, node:fs, node:test — no @remit/* or third-party
      # imports), which is why they run here instead of with the unit tests.
      - name: Script suites — unit tests
        run: npm run test:scripts

      # Reads the manifest, the workflow files and the scripts they invoke, so
      # it belongs with the other install-free static checks and reports before
      # any job installs.
      - name: CI coverage — every test and check is reachable
        run: npm run check:ci-coverage

      - name: Manifests — JSON syntax
        run: |
          python3 -c 'import json,sys; [json.load(open(f)) for f in sys.argv[1:]]' \
            package.json biome.json tsconfig.json

      - name: Manifests — YAML syntax
        run: |
          python3 -c 'import yaml,sys; [yaml.safe_load(open(f)) for f in sys.argv[1:]]' \
            .github/workflows/ci.yml .github/workflows/storybook-pages.yml \
            .github/workflows/images.yml .github/workflows/publish.yml \
            .github/workflows/release.yml .github/actions/setup/action.yml

      - name: Deploy stack — SQLite compose validates
        run: |
          printf 'PUBLIC_ORIGIN=https://ci.invalid\nTLS_MODE=off\n' > deploy/vps/.env
          docker compose -f deploy/vps/docker-compose.sqlite.yml \
            --env-file deploy/vps/.env config -q
          rm -f deploy/vps/.env

      - name: Deploy stack — dev compose validates
        run: |
          docker compose -f docker-compose.localhost-dev-generic.yml \
            --env-file localhost-dev-generic.env config -q

  # Biome reads the source tree and never the generated output, so this job
  # skips the codegen restore and reports within a minute of the push.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          codegen: "false"
      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Typecheck
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Unit tests
        run: npm run test:ci

  # The pull request half of the two-lane e2e split. This one assembles the stack
  # from the branch under review — queue sidecar, migrator, backend dev-server,
  # imap-worker, vite, SQLite, and the Dovecot container — and runs the black-box
  # suite against it. It is the regression gate: a spec that breaks does so on the
  # commit that broke it.
  #
  # The other lane is the `e2e` job in images.yml. That one runs on main against
  # the published roster and is the deploy gate. Neither replaces the other: this
  # lane has no packaged edge, so the Caddy and APISIX assertions are skipped by
  # name here (e2e/src/stack.ts) and only the image lane covers them.
  #
  # Pull requests only. On main this would re-test from source what images.yml is
  # already testing as shipped. The gate below knows this skip is legitimate and
  # accepts it on push events alone.
  e2e-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'pull_request'
    steps:
      # Every host-wide name the stack claims — the compose project and its port
      # block — is derived from this. A runner runs one job at a time and reuses
      # its name, so concurrent runs get disjoint slots and an interrupted run's
      # containers are recreated by the next run rather than left behind.
      #
      # Written to the job environment rather than declared in `env:` because the
      # `runner` context does not exist at job level.
      - name: Claim a stack slot
        run: echo "E2E_DEV_SLOT=${{ runner.name }}" >>"$GITHUB_ENV"

      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Start the source-built stack
        run: npm run e2e:dev:up

      - name: Black-box suite
        run: npm run e2e:test

      - name: Collect stack logs
        if: failure()
        env:
          E2E_LOGS_TAIL: "400"
        run: npm run e2e:dev:logs >e2e-dev-stack.log 2>&1

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-dev-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            e2e-dev-stack.log
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 14
          if-no-files-found: warn

      # `always()` rather than `failure()`: a cancelled run leaves host processes
      # and a Dovecot container holding this slot's ports, which the next run on
      # the same runner would then collide with.
      - name: Tear down
        if: always()
        run: npm run e2e:dev:down

  # The pre-publish gate: pack every open-core package, check the publish
  # closure, and install the result from the public registry into a clean
  # directory. It lives here rather than beside the real publish job in
  # publish.yml because only a job in this workflow can be a dependency of the
  # gate below, and an advisory publish check is one a broken publish surface
  # merges straight past.
  #
  # Pull requests only. On main the same content is published for real by
  # publish.yml, and a dry run of a publish that is about to happen gates
  # nothing. The gate below accepts this skip on push events alone.
  #
  # Installs directly rather than through .github/actions/setup: this job must
  # resolve the published closure against a tree built the way a consumer's
  # would be, not one restored from a workspace cache.
  publish-dry-run:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund --loglevel=error
      - run: make
      - run: npm run release:dry-run
      # Guards install-ability of the published set: a clean directory, outside
      # the repo, installing @remit/backend alone must pull and resolve its full
      # transitive @remit closure off the public registry — the failure mode this
      # pipeline exists to prevent. Each manifest declares its @remit imports, so
      # one package drags in the rest.
      - name: Clean-install acceptance
        run: |
          tmp=$(mktemp -d)
          cd "$tmp"
          npm init -y >/dev/null
          npm install @remit/backend --loglevel=error
          node -e "for (const p of ['@remit/backend','@remit/data-ports','@remit/drizzle-service','@remit/domain-enums','@remit/api-openapi-types','@remit/mailbox-service','@remit/search-service','@remit/storage-service','@remit/auth-service','@remit/secrets-service','@remit/sqs-client','@remit/mail-oauth-service','@remit/logger-lambda','@remit/api-zod-schemas','@remit/drizzle-pg-schema','@remit/drizzle-sqlite-schema']) require.resolve(p)"

      # Consumer-side acceptance for the web client's published build surface:
      # off the packed tarball, assert the harness toolchain is declared (not
      # devDependencies-only) and that `./vite-preset` plus its toolchain imports
      # resolve in a clean dir with only the declared peers installed.
      - name: Web client consumer acceptance
        run: npm run check:web-client-consumer

  # The one status check branch protection requires. Every other job in this
  # workflow is a dependency, so jobs can be added, renamed, or split here
  # without ever touching the protection settings — add the job to `needs` and
  # to the assertions below and it is enforced.
  #
  # A `needs:` job is skipped, not failed, when a dependency fails, and a skipped
  # required check reads as passing to branch protection. Hence `always()` plus
  # an assertion per dependency: `failure`, `cancelled`, and any unaccounted-for
  # `skipped` all fail here. The only legitimate skips are the two pull-request
  # only jobs, e2e-dev and publish-dry-run, on main.
  #
  # The count guard is the backstop for the two-places problem: a job wired into
  # `needs` but not asserted below fails the gate rather than riding along
  # unchecked.
  gate:
    runs-on: ubuntu-latest
    needs: [validate, lint, typecheck, test, e2e-dev, publish-dry-run]
    if: always()
    steps:
      - name: Require every job to have succeeded
        env:
          VALIDATE: ${{ needs.validate.result }}
          LINT: ${{ needs.lint.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          TEST: ${{ needs.test.result }}
          E2E_DEV: ${{ needs['e2e-dev'].result }}
          PUBLISH_DRY_RUN: ${{ needs['publish-dry-run'].result }}
          PR_ONLY_MAY_SKIP: ${{ github.event_name != 'pull_request' }}
          ALL_RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          set -u
          failed=0
          asserted=0

          require() {
            name=$1
            result=$2
            may_skip=${3:-false}
            asserted=$((asserted + 1))
            if [ "$result" = "success" ]; then
              echo "$name: success"
              return
            fi
            if [ "$result" = "skipped" ] && [ "$may_skip" = "true" ]; then
              echo "$name: skipped (expected on ${GITHUB_EVENT_NAME})"
              return
            fi
            echo "::error::$name: $result"
            failed=1
          }

          require validate "$VALIDATE"
          require lint "$LINT"
          require typecheck "$TYPECHECK"
          require test "$TEST"
          require e2e-dev "$E2E_DEV" "$PR_ONLY_MAY_SKIP"
          require publish-dry-run "$PUBLISH_DRY_RUN" "$PR_ONLY_MAY_SKIP"

          wired=0
          for _ in $ALL_RESULTS; do wired=$((wired + 1)); done
          if [ "$asserted" -ne "$wired" ]; then
            echo "::error::$wired jobs are wired into needs but $asserted are asserted"
            failed=1
          fi

          [ "$failed" -eq 0 ] || exit 1
          echo "every required job succeeded"
