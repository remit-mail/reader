include classpath("application.conf")

node-address {
  protocol = http
  host = localhost
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

queues {
  remit-local {
    defaultVisibilityTimeout = 30 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
  }
  # FIFO queues for sync operations with deduplication
  "remit-mailboxes.fifo" {
    fifo = true
    defaultVisibilityTimeout = 60 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
  }
  "remit-messages.fifo" {
    fifo = true
    defaultVisibilityTimeout = 60 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
  }
  "remit-flags.fifo" {
    fifo = true
    defaultVisibilityTimeout = 60 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
  }
  # Standard body queue (#612) — replaces the FIFO body queue
  remit-body {
    defaultVisibilityTimeout = 300 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
  }
  # Standard queues for management operations (no deduplication needed)
  remit-mailbox-mgmt {
    defaultVisibilityTimeout = 60 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
  }
  remit-message-mgmt {
    defaultVisibilityTimeout = 60 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
  }
  # Standard queue for local semantic-search indexing (drained by the
  # search-index-worker handler via the e2e-processor-shim)
  remit-search-index {
    defaultVisibilityTimeout = 300 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
  }
  # Standard queue for attachment text extraction (#449, epic #447). Producer
  # (IMAP worker) plumbing only — the attachment-scan-worker consumer lands
  # separately (#450).
  remit-attachment-scan {
    defaultVisibilityTimeout = 720 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
  }
}
