# Dovecot for the black-box e2e stack. One static user, plaintext auth, no TLS,
# an empty Maildir. The suite puts mail in over IMAP APPEND, so nothing here
# generates or ships test messages.
#
# Reachable only from the compose network and the loopback port the e2e overlay
# publishes. Do not reuse this configuration for anything holding real mail.

protocols = imap
log_path = /dev/stderr
auth_verbose = yes
ssl = no
listen = *
first_valid_uid = 1000

mail_location = maildir:/srv/mail/Maildir

passdb {
  driver = passwd-file
  args = scheme=PLAIN username_format=%u /etc/dovecot/users
}

userdb {
  driver = passwd-file
  args = username_format=%u /etc/dovecot/users
}

service imap-login {
  inet_listener imap {
    port = 143
  }
}

auth_mechanisms = plain login
disable_plaintext_auth = no

# The standard folders the client expects to navigate to. `auto = subscribe`
# creates and subscribes them on first login, so the suite never has to.
namespace inbox {
  inbox = yes
  separator = /

  mailbox Drafts {
    special_use = \Drafts
    auto = subscribe
  }
  mailbox Sent {
    special_use = \Sent
    auto = subscribe
  }
  mailbox Trash {
    special_use = \Trash
    auto = subscribe
  }
  mailbox Junk {
    special_use = \Junk
    auto = subscribe
  }
  mailbox Archive {
    special_use = \Archive
    auto = subscribe
  }
}
