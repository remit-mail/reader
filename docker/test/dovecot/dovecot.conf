# Dovecot for the black-box e2e stack. Plaintext auth, no TLS, empty mailboxes.
# The suite puts mail in over IMAP APPEND, so nothing here generates or ships
# test messages.
#
# Any username authenticates with one shared password, and each username gets
# its own maildir under /srv/mail. That is what makes runs isolated: a run picks
# a username nobody has used before and therefore starts from an empty mailbox,
# whether or not the stack was reused. A fixed account would let a previous
# run's mail satisfy this run's assertions.
#
# Reachable only from the compose network and the loopback port the e2e overlay
# publishes. Do not reuse this configuration for anything holding real mail.

protocols = imap
log_path = /dev/stderr
auth_verbose = yes
ssl = no
listen = *
first_valid_uid = 1000

mail_home = /srv/mail/%u
mail_location = maildir:~/Maildir

# The passdb carries the shared password, so it is generated from the
# environment by entrypoint.sh rather than committed here.
!include /etc/dovecot/e2e-passdb.conf

userdb {
  driver = static
  args = uid=1000 gid=1000 home=/srv/mail/%u
}

service imap-login {
  inet_listener imap {
    port = 143
  }
}

auth_mechanisms = plain login
disable_plaintext_auth = no

# The standard folders the client expects to navigate to. `auto = subscribe`
# creates and subscribes them on first login, so the suite never has to.
namespace inbox {
  inbox = yes
  separator = /

  mailbox Drafts {
    special_use = \Drafts
    auto = subscribe
  }
  mailbox Sent {
    special_use = \Sent
    auto = subscribe
  }
  mailbox Trash {
    special_use = \Trash
    auto = subscribe
  }
  mailbox Junk {
    special_use = \Junk
    auto = subscribe
  }
  mailbox Archive {
    special_use = \Archive
    auto = subscribe
  }
}
