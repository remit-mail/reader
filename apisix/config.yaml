# APISIX standalone (etcd-less) — the Postgres-parity edge auth tier.
# Routes/upstreams come from apisix.yaml (generated), not a control plane.
deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml

apisix:
  node_listen: 9080
  enable_admin: false

nginx_config:
  error_log_level: warn
